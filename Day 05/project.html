<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="project.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <div>
        <h1 class="title">Todo List</h1>
        <p class="subtitle">Vanilla HTML / CSS / JS</p>
      </div>

      <button id="themeBtn" class="btn btn-ghost">🌙 Dark</button>
    </header>

    <section class="controls">
      <form id="todoForm" class="todo-form">
        <input id="taskInput" type="text" placeholder="Add a task..." autocomplete="off" />
        <button class="btn btn-primary" type="submit">Add</button>
      </form>

      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Search tasks..." autocomplete="off" />
        <button id="clearCompletedBtn" class="btn btn-danger">Clear Completed</button>
      </div>
    </section>

    <section class="list-section">
      <p id="emptyState" class="empty">No tasks yet. Add your first task ✨</p>
      <ul id="taskList" class="task-list"></ul>
    </section>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h2>Clear completed tasks?</h2>
      <p>This will remove all completed tasks permanently.</p>

      <div class="modal-actions">
        <button id="cancelModalBtn" class="btn btn-ghost">Cancel</button>
        <button id="confirmModalBtn" class="btn btn-danger">Yes, Clear</button>
      </div>
    </div>
  </div>

  <script src="project.js"></script>
</body>
</html>
